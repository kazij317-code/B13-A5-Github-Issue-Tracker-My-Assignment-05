<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Issues Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.0/dist/full.min.css" rel="stylesheet" />

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="

<body class="bg-gray-100 bg-base-200 min-h-screen">

    <!-- Navbar -->

    <div class="navbar bg-base-100 border-b border-base-300 px-4 md:px-8 shadow">

        <div class="flex-1">
            <img src="./assets/github-logo.png" alt="" class="w-8 h-8">
            <h1 class="text-xl font-bold">Issues Tracker</h1>
        </div>

        <div class="gap-2 flex flex-col md:flex-row justify-between">

            <input id="searchInput" type="text" placeholder="Search issues..." class="input input-bordered">

            <button onclick="searchIssue()" class="btn btn-primary">
                <i class="fa-solid fa-plus"></i>New Issue
            </button>

        </div>

    </div>


    <!-- Tabs -->

    <div class="w-[80%] mx-auto justify-center mt-6 bg-[#FFFFFF] border border-[#F1F2F4] rounded-[8px] p-4">

        <button onclick="loadIssues('all')" class="button btn-primary tab border rounded-[8px]" id="all">
            All
        </button>

        <button onclick="loadIssues('open')" class="button tab border rounded-[8px]" id="open">
            Open
        </button>

        <button onclick="loadIssues('closed')" class="button tab border rounded-[8px]" id="closed">
            Closed
        </button>

    </div>

    <div
        class="card section-header mt-5 w-[80%] mx-auto flex flex-col md:flex-row justify-between bg-[#FFFFFF] border border-[#F1F2F4] rounded-[8px] p-4 ">

        <div class="flex justify-center items-center gap-3">
            <img src="./assets/Aperture.png" alt="">

            <div>
                <h2 class="font-semibold text-[20px]"><span id="tabCount"></span>&nbsp Issues</h2>
                <p class="text-[#777777]">Track and manage your project issues</p>
            </div>


        </div>

        <!-- ----------Count-------- -->
        <!--  -->
        <div class="flex gap-4 mx-10">
            <div class="flex justify-center items-center">
                <div class="w-3 h-3 bg-green-600 rounded-full"></div>
               <!-- -------------------- -->
                <p class="text-[#64748B] pl-2">
                    open
                </p>
                <!-- -------------- -->
                <p class="text-[#64748B] pl-2 hidden">
                    <span id="openCount">0</span> open
                </p>
            </div>
            <div class="flex justify-center items-center">
                <div class="w-3 h-3 bg-purple-600 rounded-full"></div>
                <!-- -------------------- -->
                 <p class="text-[#64748B] pl-2">
                    closed
                </p>
                 <!-- ------------- -->
                <p class="text-[#64748B] pl-2 hidden">
                    <span id="closedCount">0</span> closed
                </p>
            </div>
        </div>
        <!--  -->

    </div>

    <!-- Spinner -->

    <div id="spinner" class="text-center mt-10 hidden">

        <span class="loading loading-spinner loading-lg"></span>

    </div>


    <!-- Cards -->

    <div id="issuesContainer" class="border w-[80%] mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
